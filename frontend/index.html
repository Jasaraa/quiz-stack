<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QUIZSTACK</title>

<style>
body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(to right,#0f172a,#1e293b);
color:white;
margin:0;
}

.container{
width:60%;
margin:auto;
margin-top:60px;
background:#1e293b;
padding:30px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

h1{text-align:center;}

input{
width:100%;
padding:14px;
margin:10px 0;
border-radius:10px;
border:none;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:14px;
background:linear-gradient(to right,#3b82f6,#2563eb);
border:none;
border-radius:10px;
color:white;
font-size:16px;
cursor:pointer;
margin-top:15px;
}

/* QUESTION */
.question{
margin:20px 0;
padding:20px;
background:#0f172a;
border-radius:12px;
}

/* ✅ CLICKABLE OPTIONS */
.options{
margin-top:15px;
}

.option{
padding:12px;
margin:8px 0;
border-radius:8px;
background:#111827;
cursor:pointer;
transition:0.2s;
}

.option:hover{
background:#1e293b;
}

/* SELECTED STYLE */
.option.selected{
background:#3b82f6;
color:white;
}

/* RESULT */
.result{
display:none;
text-align:center;
}

.score{
font-size:40px;
color:#3b82f6;
}
</style>
</head>

<body>

<div class="container">

<h1>QUIZSTACK</h1>

<div id="form">
<input type="text" id="name" placeholder="Full Name">
<input type="email" id="email" placeholder="Email">
<input type="text" id="phone" placeholder="Phone Number">

<button onclick="startQuiz()">Start Quiz</button>
</div>

<div id="quiz" style="display:none;"></div>

<button id="submitBtn" onclick="submitQuiz()" style="display:none;">Submit Quiz</button>

<div class="result" id="result">
<h1 class="score" id="score"></h1>
<p id="details"></p>
<button onclick="location.reload()">Restart</button>
</div>

</div>

<script>

const API_URL = "https://s6tqvm6yb5.execute-api.eu-north-1.amazonaws.com/submit";

const quizData=[
{
q:"A company wants to improve application availability by distributing traffic across multiple EC2 instances. Which AWS service should be used?",
options:["Amazon Route 53","Elastic Load Balancer","AWS Lambda","Amazon CloudFront"],
answer:1
},
{
q:"A developer wants to run code without provisioning servers and only pay for execution time. Which service is best?",
options:["Amazon EC2","AWS Lambda","Amazon ECS","AWS Elastic Beanstalk"],
answer:1
},
{
q:"A company needs highly durable storage for static assets like images and videos. Which service should they choose?",
options:["Amazon EBS","Amazon S3","Amazon FSx","Instance Store"],
answer:1
},
{
q:"Which AWS service provides a fully managed NoSQL database with low latency and automatic scaling?",
options:["Amazon RDS","Amazon DynamoDB","Amazon Aurora","Amazon Redshift"],
answer:1
},
{
q:"Which AWS service is used for DNS management and routing internet traffic?",
options:["Amazon CloudFront","Amazon Route 53","AWS IAM","Amazon VPC"],
answer:1
},
{
q:"A DevOps engineer needs to monitor logs and set alarms. Which service should be used?",
options:["AWS CloudTrail","Amazon CloudWatch","Amazon SNS","AWS Config"],
answer:1
},
{
q:"Which AWS service is best suited for relational databases?",
options:["Amazon DynamoDB","Amazon RDS","Amazon S3","AWS Lambda"],
answer:1
},
{
q:"Which AWS service helps deliver content globally with low latency?",
options:["Amazon EC2","Amazon CloudFront","Amazon S3","AWS Direct Connect"],
answer:1
},
{
q:"Which AWS service manages user access and permissions securely?",
options:["Amazon Cognito","AWS IAM","AWS Organizations","AWS Directory Service"],
answer:1
},
{
q:"Which AWS feature automatically adjusts compute capacity based on demand?",
options:["AWS CloudFormation","Auto Scaling","AWS Lambda","AWS Elastic Beanstalk"],
answer:1
}
];

let answers=[];
let user={};

/* START QUIZ */
function startQuiz(){

let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let phone=document.getElementById("phone").value;

if(!name || !email || !phone){
alert("Fill all fields");
return;
}

user={name,email,phone};

document.getElementById("form").style.display="none";
document.getElementById("quiz").style.display="block";
document.getElementById("submitBtn").style.display="block";

quizData.forEach((q,i)=>{
let div=document.createElement("div");
div.className="question";

div.innerHTML=`
<h3>${i+1}. ${q.q}</h3>
<div class="options">
${q.options.map((opt,index)=>`
<div class="option" onclick="selectOption(${i}, ${index}, this)">
${opt}
</div>
`).join("")}
</div>
`;

document.getElementById("quiz").appendChild(div);
});

}

/* SELECT OPTION */
function selectOption(qIndex, optIndex, element){

answers[qIndex]=optIndex;

/* remove previous selection */
let options=element.parentElement.children;
for(let opt of options){
opt.classList.remove("selected");
}

/* add highlight */
element.classList.add("selected");
}

/* SUBMIT */
async function submitQuiz(){

let correct=0;
let attempted=0;

quizData.forEach((q,i)=>{
if(answers[i]!=null){
attempted++;
if(answers[i]==q.answer) correct++;
}
});

let wrong=attempted-correct;

await fetch(API_URL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
name:user.name,
email:user.email,
phone:user.phone,
score:correct,
correct:correct,
wrong:wrong,
attempted:attempted
})
});

document.getElementById("quiz").style.display="none";
document.getElementById("submitBtn").style.display="none";
document.getElementById("result").style.display="block";

document.getElementById("score").innerText=correct+"/10";
document.getElementById("details").innerText=
"Correct: "+correct+" | Wrong: "+wrong+" | Attempted: "+attempted;

}

</script>

</body>
</html>
